<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 AI 数字化生存等级鉴定</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --wrong: #ef4444;
            --info: #6366f1;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app { width: 95%; max-width: 650px; padding: 20px; }

        .card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .progress-container {
            width: 100%; height: 6px; background: #334155;
            border-radius: 10px; margin-bottom: 30px;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px; box-shadow: 0 0 15px var(--accent);
        }

        .category-tag { font-size: 0.8rem; color: var(--accent); font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        h2 { font-size: 1.3rem; line-height: 1.6; margin-bottom: 25px; min-height: 70px; display: flex; align-items: center; justify-content: center; }

        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 18px; border-radius: 15px; cursor: pointer;
            text-align: left; transition: 0.2s; font-size: 1rem;
            position: relative;
        }
        .option-btn:hover:not(:disabled) { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); transform: translateX(5px); }
        .option-btn:disabled { cursor: default; }

        #feedback {
            margin-top: 20px; padding: 15px; border-radius: 12px; 
            font-size: 0.95rem; line-height: 1.6; display: none;
            animation: fadeIn 0.3s ease; text-align: left;
        }
        .feedback-correct { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid var(--correct); }
        .feedback-wrong { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid var(--wrong); }
        .feedback-info { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid var(--info); }

        .score-display { font-size: 5rem; font-weight: 900; margin: 10px 0; transition: color 0.5s; }
        .result-desc { text-align: left; line-height: 1.8; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; margin-top: 20px; }

        .btn-next {
            background: var(--text-main); color: var(--bg); border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: bold;
            cursor: pointer; margin-top: 20px; display: none; width: 100%;
        }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="start-page" class="card">
        <div style="font-size: 4rem; margin-bottom: 20px;">🧠</div>
        <h1 style="margin-bottom: 10px;">2026 AI 等级鉴定</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">
            这是一场关于认知、实操与视野的深度测评。<br>
            在这个算法重构的世界，你进化到哪一步了？
        </p>
        <button class="option-btn" style="width: 100%; text-align: center; background: var(--accent); color: var(--bg); font-weight: bold;" onclick="startTest()">进入鉴定程序</button>
    </div>

    <div id="quiz-page" class="card hidden">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="quiz-content">
            <div id="q-cat" class="category-tag"></div>
            <h2 id="q-text"></h2>
            <div id="options" class="options"></div>
            <div id="feedback"></div>
            <button id="next-btn" class="btn-next" onclick="showNext()">下一题</button>
        </div>
    </div>

    <div id="result-page" class="card hidden">
        <div style="font-size: 1.2rem; color: var(--text-muted);">数字化进化率</div>
        <div id="res-score" class="score-display">0%</div>
        <h2 id="res-title" style="min-height: auto; margin-bottom: 10px;"></h2>
        <div id="res-desc" class="result-desc"></div>
        <button class="option-btn" style="width: 100%; text-align: center; margin-top: 25px;" onclick="location.reload()">重新鉴定</button>
    </div>
</div>

<script>
    const questions = [
        { cat: "第一关：名词认知", q: "什么是 AI 的“幻觉 (Hallucination)”？", cor: "B",
          a: [
              {t: "AI 试图模仿人类情感而产生的自我意识。", s: 0, f: "这是科幻电影。实际上 AI 并没有意识。"},
              {t: "算法基于概率生成的、逻辑通顺但事实错误的文本。", s: 10, isC: true},
              {t: "AI 因算力过载导致的系统底层逻辑报错。", s: 0, f: "报错通常会直接中断输出，而不是编造故事。"},
              {t: "不清楚", s: 2, isI: true, f: "没关系，这正是 AI 目前最难攻克的逻辑缺陷，了解它能帮你避开 90% 的坑。"}
          ],
          expl: "AI 本质上是概率预测机器，它并不“理解”事实，只是在拼凑听起来最合理的下文。"
        },
        { cat: "第一关：名词认知", q: "关于大语言模型的 Token 计费方式，以下描述正确的是：", cor: "C",
          a: [
              {t: "按照 AI 思考该问题所消耗的服务器 GPU 时间计费。", s: 0, f: "那可能等它思考时你会很焦虑。"},
              {t: "按照用户的对话轮次收费，每输入一句话算一次钱。", s: 0, f: "那是旧时代的短信收费逻辑。"},
              {t: "按照模型处理的字符片段数量计费。", s: 10, isC: true},
              {t: "不清楚", s: 2, isI: true, f: "计费逻辑确实枯燥，你只需要知道 AI 读书和写字都是要按“字数”算钱的。"}
          ],
          expl: "Token 是 AI 处理信息的最小单元，你可以理解为 AI 世界里的“字数”单位。"
        },
        { cat: "第一关：名词认知", q: "如何输入一个“好的提示词 (Prompt)”以获得高质量回复？", cor: "A",
          a: [
              {t: "设定角色背景、明确任务目标。", s: 10, isC: true},
              {t: "尽量保持短小精悍，只给出一个核心关键词。", s: 0, f: "过于简短会让 AI 只能靠猜。"},
              {t: "采用递归输入，通过反复发送相同指令来增加权重。", s: 0, f: "这只会让 AI 觉得你卡住了。"},
              {t: "不清楚", s: 2, isI: true, f: "提问也是门技术，只要记住“把 AI 当成一个高智商但没常识的实习生”去下指令。"}
          ],
          expl: "AI 需要明确的语境信息，给它的约束越多，它生成的质量往往越稳定。"
        },
        { cat: "第一关：名词认知", q: "本地部署大模型（如使用 Ollama）最核心的硬件门槛是：", cor: "A",
          a: [
              {t: "电脑显存的大小，它决定了模型的参数容量上限。", s: 10, isC: true},
              {t: "电脑内存的大小，它决定了模型的参数容量上限。。", s: 0, f: "内存速度远慢于显存，虽然能跑但体验极差。"},
              {t: "拥有 1Gbps 以上的对称光纤宽带。", s: 0, f: "本地部署最大的好处之一就是可以断网运行。"},
              {t: "不清楚", s: 2, isI: true, f: "这涉及硬件发烧友领域了，不知道很正常，目前云端 AI 已经足够大多数人使用了。"}
          ],
          expl: "模型运行时需要将参数存入显存，显存不够大，模型就跑不起来或者极度卡顿。"
        },
        { cat: "第二关：使用实操", q: "你使用 AI 生成图像（如 Midjourney / Stable Diffusion）的情况是：", 
          a: [
              {t: "深度使用：熟练掌握 Lora、ControlNet 及局部重绘。", s: 8},
              {t: "初级使用：偶尔生成一些简单的配图或头像。", s: 2},
              {t: "从未尝试：不了解如何通过文字生成图片。", s: 0}
          ]},
        { cat: "第二关：使用实操", q: "你使用 AI 进行文本生产（如写周报、润色、长文总结）的频率是：", 
          a: [
              {t: "高频使用：已将其作为日常主力工具。", s: 5},
              {t: "偶尔尝试：只在需要灵感时辅助一下。", s: 2},
              {t: "完全不用。", s: 0}
          ]},
        { cat: "第二关：使用实操", q: "你是否尝试过用 AI 辅助编写代码、脚本或处理 Excel 复杂公式？", 
          a: [
              {t: "经常使用：利用 Cursor/Copilot 辅助开发或写脚本。", s: 15},
              {t: "偶尔使用：让 AI 帮忙写过简单的公式或代码。", s: 5},
              {t: "从不使用。", s: 0}
          ]},
        { cat: "第二关：使用实操", q: "你是否建立过“跨软件工作流”？（如：AI写稿 -> 语音合成 -> 剪映自动成片）", 
          a: [
              {t: "是：已建立稳定的多软件联动自动化流程。", s: 20},
              {t: "是：简单尝试过跨软件的素材搬运。", s: 5},
              {t: "否：只在单个窗口内聊天。", s: 0}
          ]},
        { cat: "第二关：使用实操", q: "你是否部署并运行过 OpenClaw 或类似的自动化智能体 (Agent)？", 
          a: [
              {t: "是：已成功运行并让它自主执行过多步任务。", s: 25},
              {t: "听说过：知道其原理，但尚未动手部署。", s: 8},
              {t: "完全没听过。", s: 0}
          ]},
        { cat: "第三关：资讯视野", q: "2026年3月 NVIDIA GTC 大会上，黄仁勋发布的新架构是？", cor: "B",
          a: [
              {t: "A. Hopper Next 架构", s: 0},
              {t: "B. Vera Rubin (薇拉·鲁宾) 架构", s: 7, isC: true},
              {t: "C. Blackwell Ultra 架构", s: 0},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "Vera Rubin 架构是 2026 年的重磅发布，标志着算力密度再次发生跨代飞跃。"
        },
        { cat: "第三关：资讯视野", q: "哪款模型因在 20 分钟内自主发现了 Firefox 高危漏洞而名声大噪？", cor: "C",
          a: [
              {t: "A. Gemini 3.1", s: 0},
              {t: "B. GPT-5.3", s: 0},
              {t: "C. Claude Opus 4.6", s: 7, isC: true},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "Claude 4.6 系列在代码逻辑和长程规划上展现了惊人的能力，在安全审计领域目前领先。"
        },
        { cat: "第三关：资讯视野", q: "2026年“国际 AI 应用博览会 (AI Show 2026)”是在哪个国家举办的？", cor: "C",
          a: [
              {t: "A. 美国", s: 0},
              {t: "B. 丹麦", s: 0},
              {t: "C. 中国", s: 7, isC: true},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "此次博览会在中国北京举办，重点展示了智能体（Agent）在工业和消费市场的全面铺开。"
        },
        { cat: "第三关：资讯视野", q: "Google Gemini 3.1 Pro 现在的 100 万 Token 输入成本约是？", cor: "A",
          a: [
              {t: "A. $2", s: 7, isC: true},
              {t: "B. $10", s: 0},
              {t: "C. $0.5", s: 0},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "随着算力优化，Pro 级别的模型已经极度廉价，目前正处于各厂商的价格战阶段。"
        },
        { cat: "第三关：资讯视野", q: "2026 年 3 月国产模型 DeepSeek V4 采用了哪种架构？", cor: "C",
          a: [
              {t: "A. Dense (稠密) 架构", s: 0},
              {t: "B. RNN 架构", s: 0},
              {t: "C. MoE (混合专家) 架构", s: 7, isC: true},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "MoE 架构通过只激活部分神经元实现高效计算，是目前万亿参数模型能跑起来的关键。"
        },
        { cat: "第三关：资讯视野", q: "哪家 AI 巨头推出了“一键无痛迁移”功能，允许导入竞争对手的历史记录？", cor: "B",
          a: [
              {t: "A. OpenAI", s: 0},
              {t: "B. Anthropic (Claude)", s: 7, isC: true},
              {t: "C. Google", s: 0},
              {t: "D. 不清楚", s: 1, isI: true}
          ],
          expl: "Anthropic 这一招极大降低了用户的切换门槛，试图以此从 ChatGPT 手中抢占高端用户。"
        }
    ];

    let currentIdx = 0, totalScore = 0, isAnswered = false;
    const maxTotal = 155;

    function startTest() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        isAnswered = false;
        const q = questions[currentIdx];
        document.getElementById('q-cat').innerText = q.cat + ` (${currentIdx+1}/${questions.length})`;
        document.getElementById('q-text').innerText = q.q;
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const container = document.getElementById('options');
        container.innerHTML = '';
        
        q.a.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => handleSelect(opt, btn);
            container.appendChild(btn);
        });

        document.getElementById('progress-bar').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function handleSelect(opt, btn) {
        if(isAnswered) return;
        isAnswered = true;
        totalScore += opt.s;

        const q = questions[currentIdx];
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';

        if(q.cor) { // 知识类题目（第一、三关）
            if(opt.isC) {
                feedback.className = 'feedback-correct';
                feedback.innerHTML = "<strong>正确！</strong> " + (q.expl || "");
                btn.style.borderColor = "var(--correct)";
                btn.style.background = "rgba(16, 185, 129, 0.1)";
            } else {
                feedback.className = opt.isI ? 'feedback-info' : 'feedback-wrong';
                const prefix = opt.isI ? "了解一下：" : `选错了。正确答案是 <strong>${q.cor}</strong>：`;
                feedback.innerHTML = prefix + "<br>" + (opt.f || q.expl || "");
                btn.style.borderColor = opt.isI ? "var(--info)" : "var(--wrong)";
            }
        } else { // 实操类题目（第二关）
            feedback.className = 'feedback-correct';
            feedback.innerText = "记录成功。";
        }

        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        document.getElementById('next-btn').style.display = 'block';
    }

    function showNext() {
        currentIdx++;
        if(currentIdx < questions.length) renderQuestion(); else showResult();
    }

    function showResult() {
        document.getElementById('quiz-page').classList.add('hidden');
        const resPage = document.getElementById('result-page');
        resPage.classList.remove('hidden');
        
        const percent = Math.round((totalScore / maxTotal) * 100);
        const scoreEl = document.getElementById('res-score');
        const hue = (percent * 1.2); 
        scoreEl.style.color = `hsl(${hue}, 80%, 50%)`;
        
        let count = 0;
        const timer = setInterval(() => {
            if (count >= percent) {
                scoreEl.innerText = percent + "%";
                clearInterval(timer);
            } else {
                scoreEl.innerText = count + "%";
                count++;
            }
        }, 15);

        let title = "", desc = "";
        if(percent <= 30) {
            title = "快乐局外人";
            desc = "现在的你就像是一个在海边捡贝壳的人，看着远处波涛汹涌的赛博浪潮，还没决定是否要下水。这完全没关系，真实世界的生活同样精彩。AI 对你来说只是新闻里的背景音，你保留了最纯粹的人类原始生产力，这在未来或许反而是一种奢侈。";
        } else if(percent <= 55) {
            title = "赛博观察员";
            desc = "你已经意识到世界正在发生剧变，并尝试伸出脚尖去试探水温。你会用它写写东西、搜搜资料，虽然还没能让它完全替你工作，但你已经比大多数人清醒了。别被那些复杂的术语吓到，你缺少的只是一个属于自己的“杀手级工作流”。";
        } else if(percent <= 85) {
            title = "高阶数字民";
            desc = "恭喜！你已经完成了从“使用 AI”到“调教 AI”的跨越。你不再只是和它聊天，而是开始建立自己的自动化流，甚至尝试本地部署。在同龄人还在手动搬砖时，你已经开上了挖掘机。继续保持这份敏锐，你已经是这个新时代的领跑者了。";
        } else {
            title = "人类架构师";
            desc = "你的认知和实操已经达到了恐怖的同步。你不仅懂资讯、玩 Agent，更深谙底层计费和硬件逻辑。你已经不再被工具定义，而是在定义工具。在这个碳基与硅基融合的前夜，你就是那个制定规则的人，你是真正的赛博觉醒者。";
        }

        document.getElementById('res-title').innerText = title;
        document.getElementById('res-title').style.color = `hsl(${hue}, 80%, 50%)`;
        document.getElementById('res-desc').innerText = desc;
    }
</script>
</body>
</html>
